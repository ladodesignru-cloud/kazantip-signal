<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Monolith V4 - Organic Core</title>
    <style>
        body { margin: 0; background: #050505; overflow: hidden; font-family: 'Courier New', Courier, monospace; }
        #info { position: absolute; top: 30px; left: 30px; color: #fff; text-transform: uppercase; letter-spacing: 4px; font-size: 10px; opacity: 0.4; pointer-events: none; z-index: 10; }
        #hint { position: absolute; bottom: 40px; width: 100%; text-align: center; color: #fff; font-size: 11px; letter-spacing: 2px; opacity: 0.3; pointer-events: none; z-index: 10; transition: opacity 2s; }
        #canvas-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; cursor: crosshair; }
        #visa-link { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #fff; text-decoration: none; font-size: 24px; letter-spacing: 10px;
            display: none; z-index: 100; text-transform: uppercase;
            animation: glow 2s infinite alternate;
        }
        @keyframes glow { from { text-shadow: 0 0 10px #fff; } to { text-shadow: 0 0 30px #00ffff, 0 0 50px #00ffff; } }
    </style>
</head>
<body>
    <div id="info">SIGNAL V4 / ORGANIC CORE / KERRY</div>
    <div id="hint">TOUCH TO SYNC WITH THE ARTEFACT</div>
    <a id="visa-link" href="https://t.me/lado_clawd_bot">SIGNAL VISA</a>
    <div id="canvas-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // High-end Shader: Organic Glass with Noise Displacement
        const vertexShader = `
            uniform float uTime;
            uniform vec2 uMouse;
            varying vec2 vUv;
            varying vec3 vNormal;
            varying float vNoise;

            // Simplex 3D Noise (simplified)
            vec4 permute(vec4 x){return mod(((x*34.0)+1.0)*x, 289.0);}
            vec4 taylorInvSqrt(vec4 r){return 1.79284291400159 - 0.85373472095314 * r;}
            float snoise(vec3 v){ 
              const vec2  C = vec2(1.0/6.0, 1.0/3.0) ;
              const vec4  D = vec4(0.0, 0.5, 1.0, 2.0);
              vec3 i  = floor(v + dot(v, C.yyy) );
              vec3 x0 =   v - i + dot(i, C.xxx) ;
              vec3 g = step(x0.yzx, x0.xyz);
              vec3 l = 1.0 - g;
              vec3 i1 = min( g.xyz, l.zxy );
              vec3 i2 = max( g.xyz, l.zxy );
              vec3 x1 = x0 - i1 + 1.0 * C.xxx;
              vec3 x2 = x0 - i2 + 2.0 * C.xxx;
              vec3 x3 = x0 - 3.0 * C.xxx;
              i = mod(i, 289.0 ); 
              vec4 p = permute( permute( permute( 
                         i.z + vec4(0.0, i1.z, i2.z, 1.0 ))
                       + i.y + vec4(0.0, i1.y, i2.y, 1.0 )) 
                       + i.x + vec4(0.0, i1.x, i2.x, 1.0 ));
              float n_ = 1.0/7.0;
              vec3  ns = n_ * D.wyz - D.xzx;
              vec4 j = p - 49.0 * floor(p * ns.z *ns.z);
              vec4 x_ = floor(j * ns.z);
              vec4 y_ = floor(j - 7.0 * x_ );
              vec4 x = x_ *ns.x + ns.yyyy;
              vec4 y = y_ *ns.x + ns.yyyy;
              vec4 h = 1.0 - abs(x) - abs(y);
              vec4 b0 = vec4( x.xy, y.xy );
              vec4 b1 = vec4( x.zw, y.zw );
              vec4 s0 = floor(b0)*2.0 + 1.0;
              vec4 s1 = floor(b1)*2.0 + 1.0;
              vec4 sh = -step(h, vec4(0.0));
              vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy ;
              vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww ;
              vec3 p0 = vec3(a0.xy,h.x);
              vec3 p1 = vec3(a0.zw,h.y);
              vec3 p2 = vec3(a1.xy,h.z);
              vec3 p3 = vec3(a1.zw,h.w);
              vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2, p2), dot(p3,p3)));
              p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;
              vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
              m = m * m;
              return 42.0 * dot( m*m, vec4( dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3) ) );
            }

            void main() {
                vUv = uv;
                vNormal = normalize(normalMatrix * normal);
                
                // Animate deformation
                float noise = snoise(vec3(position.x * 0.8, position.y * 0.5 + uTime * 0.2, position.z * 0.8));
                vNoise = noise;
                
                // Interaction bulge
                float dist = distance(uv, uMouse * 0.5 + 0.5);
                float bulge = smoothstep(0.4, 0.0, dist) * 0.3;
                
                vec3 pos = position + normal * (noise * 0.3 + bulge);
                gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
            }
        `;

        const fragmentShader = `
            uniform float uTime;
            varying vec2 vUv;
            varying vec3 vNormal;
            varying float vNoise;

            void main() {
                // Fresnel for glass look
                float fresnel = pow(1.0 - dot(vNormal, vec3(0.0, 0.0, 1.0)), 2.5);
                
                // Iridescent colors
                vec3 color1 = vec3(0.0, 0.8, 1.0); // Cyan
                vec3 color2 = vec3(0.6, 0.0, 1.0); // Purple
                vec3 finalColor = mix(color1, color2, vNoise * 0.5 + 0.5);
                
                // Soft Core
                float core = 1.0 - length(vUv - 0.5) * 2.0;
                core = clamp(core, 0.0, 1.0);
                
                vec3 glassColor = mix(vec3(0.02, 0.02, 0.05), finalColor, fresnel * 0.8 + vNoise * 0.1);
                glassColor += finalColor * pow(vNoise, 4.0) * 0.5; // Inner glows
                
                gl_FragColor = vec4(glassColor, 1.0);
            }
        `;

        let scene, camera, renderer, core;
        let mouse = new THREE.Vector2(0, 0);
        let audioCtx, oscillator, filter, gain;

        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            oscillator = audioCtx.createOscillator();
            filter = audioCtx.createBiquadFilter();
            gain = audioCtx.createGain();

            oscillator.type = 'sine';
            filter.type = 'lowpass';
            gain.gain.value = 0;
            gain.gain.linearRampToValueAtTime(0.06, audioCtx.currentTime + 2);

            oscillator.connect(filter);
            filter.connect(gain);
            gain.connect(audioCtx.destination);
            oscillator.start();
            document.getElementById('hint').style.opacity = 0;
        }

        function updateAudio() {
            if (oscillator) {
                const freq = 40 + (mouse.x + 1) * 20;
                const fFreq = 200 + (mouse.y + 1) * 800;
                oscillator.frequency.setTargetAtTime(freq, audioCtx.currentTime, 0.1);
                filter.frequency.setTargetAtTime(fFreq, audioCtx.currentTime, 0.1);
            }
        }

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // 1. Organic Core (Sphere with high detail for displacement)
            const geometry = new THREE.SphereGeometry(1.5, 128, 128);
            const material = new THREE.ShaderMaterial({
                uniforms: {
                    uTime: { value: 0 },
                    uMouse: { value: mouse }
                },
                vertexShader,
                fragmentShader,
                transparent: true
            });
            core = new THREE.Mesh(geometry, material);
            core.scale.set(1, 2.2, 1);
            scene.add(core);

            camera.position.z = 6;

            const handleInput = (x, y) => {
                mouse.x = (x / window.innerWidth) * 2 - 1;
                mouse.y = -(y / window.innerHeight) * 2 + 1;
                updateAudio();
            };

            window.addEventListener('mousemove', (e) => handleInput(e.clientX, e.clientY));
            window.addEventListener('touchstart', (e) => {
                initAudio();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                handleInput(e.touches[0].clientX, e.touches[0].clientY);
            });
            window.addEventListener('touchmove', (e) => handleInput(e.touches[0].clientX, e.touches[0].clientY));
            window.addEventListener('click', () => {
                initAudio();
                // Activation logic could be added here
                if(Math.random() > 0.8) document.getElementById('visa-link').style.display = 'block';
            });

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            const t = Date.now() * 0.001;
            core.material.uniforms.uTime.value = t;
            core.material.uniforms.uMouse.value = mouse;
            core.rotation.y = t * 0.1;
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
