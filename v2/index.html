<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Monolith V2 - Ellipse Proto</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', Courier, monospace; }
        #info { position: absolute; top: 20px; left: 20px; color: #00ffff; text-transform: uppercase; letter-spacing: 2px; font-size: 10px; opacity: 0.7; pointer-events: none; }
        #hint { position: absolute; bottom: 30px; width: 100%; text-align: center; color: #fff; font-size: 12px; letter-spacing: 1px; opacity: 0.5; pointer-events: none; }
    </style>
</head>
<body>
    <div id="info">Ellipsoid V2 / Kerry / Signal</div>
    <div id="hint">TAP TO ACTIVATE FREQUENCY</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, monolith, points = [];
        let mouse = new THREE.Vector2(0, 0);
        let audioCtx, oscillator, gainNode, filter;

        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            oscillator = audioCtx.createOscillator();
            gainNode = audioCtx.createGain();
            filter = audioCtx.createBiquadFilter();

            oscillator.type = 'sawtooth';
            filter.type = 'lowpass';
            
            gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
            gainNode.gain.linearRampToValueAtTime(0.05, audioCtx.currentTime + 1);

            oscillator.connect(filter);
            filter.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            oscillator.start();
            document.getElementById('hint').style.display = 'none';
        }

        function updateInput(x, y) {
            mouse.x = (x / window.innerWidth) * 2 - 1;
            mouse.y = -(y / window.innerHeight) * 2 + 1;
            
            if (oscillator) {
                const freq = 60 + (mouse.x + 1) * 40; // Deep drone
                const filterFreq = 200 + (mouse.y + 1) * 1500;
                oscillator.frequency.setTargetAtTime(freq, audioCtx.currentTime, 0.1);
                filter.frequency.setTargetAtTime(filterFreq, audioCtx.currentTime, 0.1);
            }
        }

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // 1. Ellipsoid Geometry (Scaled Sphere)
            const geometry = new THREE.SphereGeometry(1, 64, 64);
            const material = new THREE.ShaderMaterial({
                uniforms: {
                    time: { value: 0 },
                    mouse: { value: mouse }
                },
                vertexShader: `
                    varying vec2 vUv;
                    varying vec3 vNormal;
                    void main() {
                        vUv = uv;
                        vNormal = normalize(normalMatrix * normal);
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    uniform float time;
                    uniform vec2 mouse;
                    varying vec2 vUv;
                    varying vec3 vNormal;
                    void main() {
                        float fresnel = pow(1.0 - dot(vNormal, vec3(0.0, 0.0, 1.0)), 3.0);
                        vec3 color = vec3(0.02, 0.02, 0.05); // Base dark
                        
                        // Energy veins
                        float vein = sin(vUv.y * 20.0 + time * 2.0 + sin(vUv.x * 10.0)) * 0.5 + 0.5;
                        vein = pow(vein, 10.0);
                        
                        color += vec3(0.0, 0.8, 1.0) * vein * 0.3;
                        color += vec3(0.5, 0.0, 1.0) * fresnel;
                        
                        gl_FragColor = vec4(color, 1.0);
                    }
                `
            });
            monolith = new THREE.Mesh(geometry, material);
            monolith.scale.set(1.5, 3.5, 1.5); // Making it an Ellipse
            scene.add(monolith);

            camera.position.z = 8;

            // Events
            window.addEventListener('mousemove', (e) => updateInput(e.clientX, e.clientY));
            window.addEventListener('touchstart', (e) => {
                initAudio();
                if (audioCtx.state === 'suspended') audioCtx.resume();
                updateInput(e.touches[0].clientX, e.touches[0].clientY);
            });
            window.addEventListener('touchmove', (e) => {
                updateInput(e.touches[0].clientX, e.touches[0].clientY);
            });
            window.addEventListener('click', initAudio);

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            const t = Date.now() * 0.001;
            monolith.rotation.y = Math.sin(t * 0.2) * 0.5;
            monolith.rotation.z = Math.cos(t * 0.3) * 0.1;
            
            if (monolith.material.uniforms) {
                monolith.material.uniforms.time.value = t;
            }

            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
